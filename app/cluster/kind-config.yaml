# MUSTER demo cluster (kind). Single node keeps it light; the backend talks to it
# via kubectl/kubeconfig (kind-muster context). Created with:
#   kind create cluster --name muster --config kind-config.yaml --image kindest/node:v1.36.1
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: muster
nodes:
  - role: control-plane
