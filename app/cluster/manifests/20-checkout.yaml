# NETWORK domain target. Breaking the Service selector blackholes traffic
# (endpoints drop to 0) while pods stay healthy. Reversible remediation =
# `kubectl patch svc` to restore the correct selector.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-web
  namespace: shop
  labels: { app: checkout-web, domain: network }
spec:
  replicas: 2
  selector:
    matchLabels: { app: checkout-web }
  template:
    metadata:
      labels: { app: checkout-web, domain: network }
    spec:
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports: [{ containerPort: 80 }]
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 2
            periodSeconds: 3
          resources:
            requests: { cpu: "10m", memory: "16Mi" }
            limits: { cpu: "100m", memory: "64Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-web
  namespace: shop
  annotations: { muster.correct-selector: "app=checkout-web" }
spec:
  selector: { app: checkout-web }
  ports: [{ port: 80, targetPort: 80 }]
