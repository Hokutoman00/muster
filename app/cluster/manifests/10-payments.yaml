# WORKLOAD domain target. A bad rollout (wrong image tag) drives CrashLoopBackOff /
# ImagePullBackOff. Reversible remediation = `kubectl rollout undo`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: shop
  labels: { app: payments-api, domain: workload }
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels: { app: payments-api }
  template:
    metadata:
      labels: { app: payments-api, domain: workload }
    spec:
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports: [{ containerPort: 80 }]
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 2
            periodSeconds: 3
          resources:
            requests: { cpu: "10m", memory: "16Mi" }
            limits: { cpu: "100m", memory: "64Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: payments-api
  namespace: shop
spec:
  selector: { app: payments-api }
  ports: [{ port: 80, targetPort: 80 }]
